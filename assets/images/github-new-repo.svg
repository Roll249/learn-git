<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="24" width="1200" height="56" rx="10" fill="#161B22" stroke="#30363D"/>
  <text x="68" y="58" fill="#E6EDF3" font-size="20" font-family="Inter, Arial">GitHub</text>
  <rect x="90" y="116" width="1100" height="560" rx="14" fill="url(#panel)" stroke="#30363D"/>
  <text x="130" y="170" fill="#E6EDF3" font-size="30" font-family="Inter, Arial" font-weight="700">Create a new repository</text>

  <text x="130" y="220" fill="#8B949E" font-size="16" font-family="Inter, Arial">Repository name</text>
  <rect x="130" y="236" width="530" height="46" rx="8" fill="#0D1117" stroke="#30363D"/>
  <text x="150" y="266" fill="#E6EDF3" font-size="16" font-family="Inter, Arial">my-project</text>

  <text x="130" y="320" fill="#8B949E" font-size="16" font-family="Inter, Arial">Description (optional)</text>
  <rect x="130" y="336" width="900" height="46" rx="8" fill="#0D1117" stroke="#30363D"/>

  <rect x="130" y="412" width="20" height="20" rx="4" fill="#0D1117" stroke="#30363D"/>
  <text x="164" y="427" fill="#8B949E" font-size="15" font-family="Inter, Arial">Add a README file</text>
  <rect x="130" y="448" width="20" height="20" rx="4" fill="#0D1117" stroke="#30363D"/>
  <text x="164" y="463" fill="#8B949E" font-size="15" font-family="Inter, Arial">Add .gitignore</text>
  <rect x="130" y="484" width="20" height="20" rx="4" fill="#0D1117" stroke="#30363D"/>
  <text x="164" y="499" fill="#8B949E" font-size="15" font-family="Inter, Arial">Choose a license</text>

  <rect x="128" y="546" width="940" height="66" rx="10" fill="#0D1117" stroke="#30363D"/>
  <text x="154" y="575" fill="#58A6FF" font-size="14" font-family="Inter, Arial" font-weight="700">TIP FOR FIRST PUSH FROM LOCAL</text>
  <text x="154" y="598" fill="#E6EDF3" font-size="15" font-family="Inter, Arial">Để tránh conflict ban đầu, hãy để các checkbox README/.gitignore/license ở trạng thái không chọn.</text>

  <rect x="980" y="610" width="210" height="46" rx="8" fill="#238636"/>
  <text x="1004" y="640" fill="#FFFFFF" font-size="17" font-family="Inter, Arial" font-weight="700">Create repository</text>
</svg>
