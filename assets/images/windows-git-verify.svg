<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#020617"/>
  <rect x="120" y="70" width="1040" height="580" rx="14" fill="#0B1220" stroke="#334155"/>
  <rect x="120" y="70" width="1040" height="46" rx="14" fill="#111827"/>
  <text x="152" y="99" fill="#E5E7EB" font-size="18" font-family="Inter, Arial">Git Bash</text>

  <text x="160" y="162" fill="#22C55E" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">$ git --version</text>
  <text x="160" y="206" fill="#E2E8F0" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">git version 2.49.0.windows.1</text>

  <rect x="160" y="248" width="960" height="128" rx="10" fill="#0F172A" stroke="#334155"/>
  <text x="188" y="294" fill="#93C5FD" font-size="16" font-family="Inter, Arial" font-weight="700">Success</text>
  <text x="188" y="324" fill="#CBD5E1" font-size="15" font-family="Inter, Arial">Nếu hiển thị dòng version như trên, Git đã cài thành công và sẵn sàng dùng.</text>

  <rect x="160" y="408" width="960" height="190" rx="10" fill="#0F172A" stroke="#334155"/>
  <text x="188" y="448" fill="#FCA5A5" font-size="16" font-family="Inter, Arial" font-weight="700">Nếu báo lỗi 'git is not recognized'</text>
  <text x="188" y="482" fill="#CBD5E1" font-size="15" font-family="Inter, Arial">1) Khởi động lại terminal và thử lại.</text>
  <text x="188" y="510" fill="#CBD5E1" font-size="15" font-family="Inter, Arial">2) Mở lại installer Git và chọn PATH option cho command line.</text>
  <text x="188" y="538" fill="#CBD5E1" font-size="15" font-family="Inter, Arial">3) Cài lại Git bằng tùy chọn mặc định Recommended.</text>
</svg>
